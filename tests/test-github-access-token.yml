name: Test github_access_token input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          github_access_token: ${{ github.token }}
      - name: Assert nix is installed
        run: |
          echo "Checking nix installation..."
          if ! command -v nix &>/dev/null; then
            echo "FAIL: nix command not found"
            exit 1
          fi
          echo "PASS: nix is installed"
      - name: Assert nix works
        run: |
          nix --version
          echo "PASS: nix --version succeeded"
