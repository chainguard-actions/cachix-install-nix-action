name: Test Nix installation with github_access_token
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          github_access_token: dummy-token-for-testing
          enable_kvm: false
          set_as_trusted_user: true
      - name: Assert nix is installed
        run: |
          echo "Checking nix is available..."
          if ! command -v nix &>/dev/null; then
            echo "FAIL: nix command not found"
            exit 1
          fi
          echo "PASS: nix is installed at $(command -v nix)"
          nix --version
      - name: Assert github access token config was applied
        run: |
          echo "Checking nix.conf for github access-tokens setting..."
          if ! grep -q "access-tokens" /etc/nix/nix.conf; then
            echo "FAIL: access-tokens not found in /etc/nix/nix.conf"
            cat /etc/nix/nix.conf
            exit 1
          fi
          echo "PASS: github_access_token was applied to nix config"
