name: Test Nix installation with custom experimental features
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Nix with custom experimental-features
        id: install-nix
        uses: .
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Assert nix binary is on PATH
        run: |
          echo "Checking for nix binary..."
          if ! command -v nix &>/dev/null; then
            echo "FAIL: nix binary not found on PATH"
            exit 1
          fi
          echo "PASS: nix found at $(command -v nix)"

      - name: Assert nix flakes command works
        run: |
          echo "Testing nix flake --help..."
          if ! nix flake --help &>/dev/null; then
            echo "FAIL: nix flake command not available (experimental-features may not be set)"
            exit 1
          fi
          echo "PASS: nix flake command is available"

      - name: Assert nix store exists
        run: |
          if [ ! -d /nix/store ]; then
            echo "FAIL: /nix/store directory does not exist"
            exit 1
          fi
          echo "PASS: /nix/store exists"
