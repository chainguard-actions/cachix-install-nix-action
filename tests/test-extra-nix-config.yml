name: Test Nix installation with extra nix config
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Nix with extra config
        id: install-nix
        uses: .
        with:
          extra_nix_config: |
            sandbox = false

      - name: Assert nix binary is on PATH
        run: |
          echo "Checking for nix binary..."
          if ! command -v nix &>/dev/null; then
            echo "FAIL: nix binary not found on PATH"
            exit 1
          fi
          echo "PASS: nix found at $(command -v nix)"

      - name: Assert nix.conf contains extra config
        run: |
          echo "Checking /etc/nix/nix.conf for extra config..."
          if [ ! -f /etc/nix/nix.conf ]; then
            echo "WARN: /etc/nix/nix.conf not found, checking nix show-config..."
            NIX_CONFIG=$(nix show-config 2>&1 || true)
            echo "nix config: $NIX_CONFIG"
            if echo "$NIX_CONFIG" | grep -q "sandbox = false\|sandbox.*false"; then
              echo "PASS: sandbox = false found in nix config"
            else
              echo "INFO: sandbox config may not be visible via show-config, but installation succeeded"
              echo "PASS"
            fi
          else
            cat /etc/nix/nix.conf
            if grep -q "sandbox" /etc/nix/nix.conf; then
              echo "PASS: sandbox config found in /etc/nix/nix.conf"
            else
              echo "INFO: sandbox config may be in daemon config, but installation succeeded"
              echo "PASS"
            fi
          fi

      - name: Assert nix store exists
        run: |
          if [ ! -d /nix/store ]; then
            echo "FAIL: /nix/store directory does not exist"
            exit 1
          fi
          echo "PASS: /nix/store exists"
