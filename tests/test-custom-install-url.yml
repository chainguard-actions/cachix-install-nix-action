name: Test Nix installation with custom install_url
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: install-nix
        uses: .
        with:
          install_url: "https://releases.nixos.org/nix/nix-2.34.7/install"
          install_options: "--no-daemon"
      - name: Assert Nix is installed
        run: |
          echo "Checking nix binary..."
          if ! command -v nix &>/dev/null; then
            echo "FAIL: nix binary not found in PATH"
            exit 1
          fi
          echo "PASS: nix is installed at $(command -v nix)"
      - name: Assert nix command works
        run: |
          nix --version
          echo "PASS: nix --version succeeded"
