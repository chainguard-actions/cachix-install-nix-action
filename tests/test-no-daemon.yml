name: Test Nix installation with no-daemon mode
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: install-nix
        uses: .
        with:
          enable_kvm: false
          install_options: --no-daemon
      - name: Assert nix binary is available
        run: |
          echo "Checking for nix binary in PATH..."
          if ! command -v nix &>/dev/null; then
            echo "FAIL: nix binary not found in PATH"
            exit 1
          fi
          echo "PASS: nix found at $(command -v nix)"
      - name: Assert nix daemon is not running
        run: |
          echo "Checking that nix-daemon is not running..."
          if systemctl is-active nix-daemon &>/dev/null 2>&1; then
            echo "WARN: nix-daemon is running (may be expected in some environments)"
          else
            echo "PASS: nix-daemon is not active (no-daemon mode confirmed)"
          fi
      - name: Assert nix store is accessible
        run: |
          echo "Checking /nix/store..."
          if [[ ! -d /nix/store ]]; then
            echo "FAIL: /nix/store does not exist"
            exit 1
          fi
          echo "PASS: /nix/store exists"
      - name: Assert nix version works
        run: |
          NIX_VER=$(nix --version 2>&1 || true)
          echo "nix version: $NIX_VER"
          if [[ -z "$NIX_VER" ]]; then
            echo "FAIL: nix --version returned empty output"
            exit 1
          fi
          echo "PASS: $NIX_VER"
