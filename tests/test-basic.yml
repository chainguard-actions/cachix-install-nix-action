name: Test basic Nix installation
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: install-nix
        uses: .
        with:
          enable_kvm: false
      - name: Assert nix binary is available
        run: |
          echo "Checking for nix binary in PATH..."
          if ! command -v nix &>/dev/null; then
            echo "FAIL: nix binary not found in PATH"
            exit 1
          fi
          echo "PASS: nix found at $(command -v nix)"
      - name: Assert nix version runs
        run: |
          echo "Running nix --version..."
          NIX_VER=$(nix --version 2>&1 || true)
          echo "nix version output: $NIX_VER"
          if [[ -z "$NIX_VER" ]]; then
            echo "FAIL: nix --version returned empty output"
            exit 1
          fi
          echo "PASS: $NIX_VER"
      - name: Assert NIX_PROFILES is set
        env:
          NIX_PROFILES: ${{ env.NIX_PROFILES }}
        run: |
          echo "NIX_PROFILES: $NIX_PROFILES"
          if [[ -z "$NIX_PROFILES" ]]; then
            echo "FAIL: NIX_PROFILES env var not set"
            exit 1
          fi
          echo "PASS: NIX_PROFILES=$NIX_PROFILES"
      - name: Assert /nix directory exists
        run: |
          if [[ ! -d /nix ]]; then
            echo "FAIL: /nix directory does not exist"
            exit 1
          fi
          echo "PASS: /nix directory exists"
