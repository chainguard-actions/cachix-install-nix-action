name: Test install_url input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          install_url: https://releases.nixos.org/nix/nix-2.18.1/install
      - name: Assert nix is installed
        run: |
          echo "Checking nix installation with custom install_url..."
          if ! command -v nix &>/dev/null; then
            echo "FAIL: nix command not found after install with custom URL"
            exit 1
          fi
          echo "PASS: nix is installed"
      - name: Assert nix version
        run: |
          nix --version
          echo "PASS: nix --version succeeded"
